<mat-card>
  <mat-toolbar color="primary">Detalhes do Curso</mat-toolbar>

  <mat-card-content>
    <form [formGroup]="form" class="min-width">
      <fieldset [disabled]="isSaving()" style="border: none; padding: 0; margin: 0;">

        <mat-form-field class="full-width">
          <mat-label>Nome</mat-label>
          <input matInput placeholder="Ex: Angular Avançado" formControlName="name">
        @if (form.get('name')?.invalid) {
          <mat-error>{{ getErrorMessage('name') }}</mat-error>
          }
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Categoria</mat-label>
          <mat-select formControlName="category">
            <mat-option value="front-end">Front-end</mat-option>
            <mat-option value="back-end">Back-end</mat-option>
          </mat-select>
        @if (form.get('category')?.invalid) {
          <mat-error>{{ getErrorMessage('category') }}</mat-error>
          }
        </mat-form-field>

      </fieldset>
    </form>
  </mat-card-content>

<mat-card-actions class="actions-column">
    <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="isSaving()">
      Salvar
    </button>
    <button mat-button (click)="onCancel()">Cancelar</button>
  </mat-card-actions>
</mat-card>
